name: Release WinDurango

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        triplet: [x64-windows, x64-windows-static]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Restore vcpkg and CMake cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg_installed
          key: ${{ runner.os }}-${{ matrix.triplet }}-${{ hashFiles('vcpkg.json', '**/CMakeLists.txt') }}

      - name: Install vcpkg dependencies
        shell: pwsh
        run: vcpkg install --triplet ${{ matrix.triplet }}

      - name: Configure CMake
        shell: pwsh
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}

      - name: Build project
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Package artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $tagName = if ('${{ github.ref_type }}' -eq 'tag') { '${{ github.ref_name }}' } else { 'manual' }
          $archive = "dist/WinDurango-$tagName-${{ matrix.triplet }}.zip"
          Compress-Archive -Path build/bin/*, build/**/*.dll, build/**/*.exe -DestinationPath $archive

      - name: Create release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.zip
          generate_release_notes: true

      - name: Upload workflow artifacts (manual runs)
        uses: actions/upload-artifact@v4
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        with:
          name: WinDurango-release-${{ matrix.triplet }}
          path: dist/*.zip
